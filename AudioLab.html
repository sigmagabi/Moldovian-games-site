    <style>
        :root { --accent: #00d2ff; --bg: #0f0f0f; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: #1a1a1a; padding: 25px; border-radius: 15px; width: 100%; max-width: 450px; border: 1px solid #333; }
        
        .recorder-controls { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; }
        button { padding: 12px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; text-transform: uppercase; }
        
        #recordBtn { background: #ff4b2b; color: white; }
        #recordBtn.active { background: #aa0000; animation: pulse 1s infinite; }
        #stopBtn { background: #444; color: white; }
        
        .sound-item { background: #252525; padding: 15px; margin-top: 15px; border-radius: 10px; border-left: 4px solid var(--accent); }
        .edit-row { margin: 12px 0; display: flex; align-items: center; gap: 10px; }
        label { min-width: 60px; color: #888; font-size: 0.8rem; }
        input[type="range"] { flex: 1; accent-color: var(--accent); cursor: pointer; }
        
        .play-btn { background: var(--accent); width: 100%; color: black; margin-top: 10px; }
        .del-btn { background: none; color: #ff6b6b; font-size: 0.7rem; float: right; padding: 0; }
        .download-game-btn { background: #39ff14; color: black; width: 100%; margin-top: 25px; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>

            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = () => createItem(reader.result);
                // Oprim stream-ul pentru a elibera microfonul
                stream.getTracks().forEach(track => track.stop());
            };

            mediaRecorder.start();
            document.getElementById('recordBtn').classList.add('active');
            document.getElementById('recordBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
        } catch (err) {
            alert("Eroare microfon!");
        }
    };

    document.getElementById('stopBtn').onclick = () => {
        mediaRecorder.stop();
        document.getElementById('recordBtn').classList.remove('active');
        document.getElementById('recordBtn').disabled = false;
        document.getElementById('stopBtn').disabled = true;
    };

    function createItem(audioData) {
        const id = 's' + Date.now();
        const div = document.createElement('div');
        div.className = 'sound-item';
        div.id = id;
        div.setAttribute('data-audio', audioData);

        div.innerHTML = `
            <button class="del-btn" onclick="document.getElementById('${id}').remove()">Șterge</button>
            <strong style="color:var(--accent)">Secvență Audio</strong>
            
            <div class="edit-row">
                <label>Viteză:</label>
                <input type="range" class="speed-slider" min="0.5" max="2" step="0.1" value="1">
            </div>

            <div class="edit-row">
                <label>Volum:</label>
                <input type="range" class="volume-slider" min="0" max="1" step="0.1" value="1">
            </div>

            <button class="play-btn" onclick="play('${id}')">REDARE CURATĂ</button>
        `;
        list.appendChild(div);
    }

    function play(id) {
        const item = document.getElementById(id);
        const audioData = item.getAttribute('data-audio');
        const speed = item.querySelector('.speed-slider').value;
        const vol = item.querySelector('.volume-slider').value;
        
        // Folosim obiectul Audio direct pentru a evita glitch-urile de procesare noduri
        const audio = new Audio();
        audio.src = audioData;
        audio.playbackRate = parseFloat(speed);
        audio.volume = parseFloat(vol);
        
        // Trick pentru a preveni glitch-ul la startul redării în unele browsere
        audio.oncanplaythrough = () => audio.play();
    }

    document.getElementById('downloadGame').onclick = () => {
        const html = document.documentElement.outerHTML;
        const blob = new Blob([html], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'joc_audio_perfect.html';
        a.click();
    };
</script>
