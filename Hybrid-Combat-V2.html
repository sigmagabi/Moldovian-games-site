<html lang="ro"><head></head><body contenteditable="false">
The content of the body element is displayed in your browser.






    <meta charset="UTF-8">
    <title>Hybrid Combat: Arena Limits</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; overflow: hidden; }
        .screen { display: none; padding: 20px; }
        .active { display: block; }

        canvas {
            background: linear-gradient(to bottom, #1a0a0a, #050505);
            border: 4px solid #800;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
        }

        .ui-overlay {
            position: absolute;
            top: 50px;
            width: 800px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }

        .hp-bar { width: 300px; height: 30px; background: #333; border: 2px solid #fff; position: relative; }
        .hp-fill { width: 100%; height: 100%; background: #f00; transition: width 0.1s; }
        #log { font-size: 24px; color: #f00; font-weight: bold; text-shadow: 2px 2px #000; }
        
        .controls-bar { margin: 10px; }
        button, select {
            padding: 12px 20px;
            background: #222;
            color: #fff;
            border: 2px solid #555;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }
        button:hover { background: #f00; border-color: #fff; }
        .dl-btn { background: #0080ff; border-color: #004080; }
    </style>



<div id="creator" class="screen active">
    <h1 style="color: #f00; letter-spacing: 5px;">HYBRID CREATOR</h1>
    <div class="controls-bar">
        <select id="a1"><option>URS</option><option>LUP</option><option>TAUR</option><option>GORILA</option><option>DINO</option></select>
        <select id="a2"><option>DRAGON</option><option>SCORPION</option><option>VULTUR</option></select>
        <button onclick="generate()">GENEREAZĂ</button>
        <button onclick="startBattle()">FIGHT!</button>
        <button class="dl-btn" onclick="downloadGame()">📥 DOWNLOAD JOC</button>
    </div>
    <canvas id="cv1" width="800" height="400"></canvas>
</div>

<div id="battle" class="screen">
    <div class="ui-overlay">
        <div><div id="p1-name">PLAYER</div><div class="hp-bar"><div id="hp1" class="hp-fill"></div></div></div>
        <div id="log">FIGHT!</div>
        <div><div id="p2-name">BOT</div><div class="hp-bar"><div id="hp2" class="hp-fill"></div></div></div>
    </div>
    <canvas id="cv2" width="1000" height="500"></canvas>
    <p>CONTROALE: <b>A / D</b> Mișcare | <b>SPACE</b> SARI | <b>CLICK</b> Atac</p>
    <button onclick="location.reload()">MENIU PRINCIPAL</button>
</div>

<script>
let hybrid = null;
let gameRunning = false;
const gravity = 0.8;
const floorY = 450;
const canvasW = 1000;

let player = { 
    x: 150, y: floorY - 40, hp: 100, 
    vx: 0, vy: 0, jumping: false, 
    speed: 7, bullets: [] 
};

let bot = { 
    x: 850, y: floorY - 40, hp: 100, 
    vx: 0, vy: 0, speed: 3, 
    bullets: [], lastShoot: 0 
};

let keys = {};

function drawHybrid(ctx, x, y, a1, a2, scale = 1, flip = false) {
    ctx.save();
    ctx.translate(x, y);
    if(flip) ctx.scale(-1, 1);
    ctx.scale(scale, scale);

    let base = "#5a3b1e";
    if(a1 === "LUP") base = "#3a3a3a";
    if(a1 === "TAUR") base = "#442200";
    if(a1 === "GORILA") base = "#1a1a1a";
    if(a1 === "DINO") base = "#0a5";

    ctx.fillStyle = base;
    ctx.beginPath(); ctx.ellipse(0, 0, 40, 30, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(0, -30, 25, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "red";
    ctx.beginPath(); ctx.arc(-10, -35, 4, 0, Math.PI * 2); ctx.arc(10, -35, 4, 0, Math.PI * 2); ctx.fill();

    if(a2 === "DRAGON" || a2 === "VULTUR") {
        ctx.fillStyle = a2 === "DRAGON" ? "rgba(150,0,0,0.7)" : "rgba(200,200,200,0.7)";
        ctx.beginPath(); ctx.moveTo(-30, 0); ctx.lineTo(-80, -50); ctx.lineTo(-20, -10); ctx.fill();
    }
    if(a2 === "SCORPION") {
        ctx.strokeStyle = "#0f0"; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(30, 0); ctx.quadraticCurveTo(60, -40, 50, -60); ctx.stroke();
    }
    ctx.restore();
}

function generate() {
    hybrid = { a1: document.getElementById("a1").value, a2: document.getElementById("a2").value };
    let ctx = document.getElementById("cv1").getContext("2d");
    ctx.clearRect(0,0,800,400);
    drawHybrid(ctx, 400, 250, hybrid.a1, hybrid.a2, 2.5);
}

function startBattle() {
    if(!hybrid) { alert("Generează hibridul!"); return; }
    document.getElementById("creator").className = "screen";
    document.getElementById("battle").className = "screen active";
    gameRunning = true;
    requestAnimationFrame(update);
}

window.addEventListener("keydown", e => {
    if(e.code === "Space") e.preventDefault(); // Previne scroll-ul paginii
    keys[e.code] = true;
});
window.addEventListener("keyup", e => keys[e.code] = false);
window.addEventListener("mousedown", e => {
    if(!gameRunning) return;
    let rect = document.getElementById("cv2").getBoundingClientRect();
    let angle = Math.atan2((e.clientY - rect.top) - player.y, (e.clientX - rect.left) - player.x);
    player.bullets.push({ x: player.x, y: player.y, vx: Math.cos(angle) * 12, vy: Math.sin(angle) * 12 });
});

function update() {
    if(!gameRunning) return;

    // MIȘCARE ȘI LIMITĂRI HARTĂ
    if(keys['KeyA'] && player.x > 50) player.x -= player.speed;
    if(keys['KeyD'] && player.x < canvasW - 50) player.x += player.speed;
    
    // SĂRITURĂ PE SPACE (W dezactivat)
    if(keys['Space'] && !player.jumping) {
        player.vy = -18;
        player.jumping = true;
    }

    // GRAVITAȚIE
    player.vy += gravity;
    player.y += player.vy;

    if(player.y >= floorY - 40) {
        player.y = floorY - 40;
        player.vy = 0;
        player.jumping = false;
    }

    // BOT AI CU LIMITĂRI
    if(bot.x > player.x + 150 && bot.x > 50) bot.x -= bot.speed;
    else if(bot.x < player.x - 150 && bot.x < canvasW - 50) bot.x += bot.speed;

    if(Date.now() - bot.lastShoot > 1200) {
        let angle = Math.atan2(player.y - bot.y, player.x - bot.x);
        bot.bullets.push({ x: bot.x, y: bot.y, vx: Math.cos(angle) * 8, vy: Math.sin(angle) * 8 });
        bot.lastShoot = Date.now();
    }

    // BULLETS
    player.bullets.forEach((b, i) => {
        b.x += b.vx; b.y += b.vy;
        if(Math.hypot(b.x - bot.x, b.y - bot.y) < 50) { bot.hp -= 8; player.bullets.splice(i, 1); }
        if(b.x < 0 || b.x > canvasW) player.bullets.splice(i, 1);
    });
    bot.bullets.forEach((b, i) => {
        b.x += b.vx; b.y += b.vy;
        if(Math.hypot(b.x - player.x, b.y - player.y) < 50) { player.hp -= 4; bot.bullets.splice(i, 1); }
        if(b.x < 0 || b.x > canvasW) bot.bullets.splice(i, 1);
    });

    if(player.hp <= 0 || bot.hp <= 0) gameRunning = false;
    
    drawBattle();
    requestAnimationFrame(update);
}

function drawBattle() {
    let ctx = document.getElementById("cv2").getContext("2d");
    ctx.clearRect(0, 0, 1000, 500);
    ctx.fillStyle = "#333"; ctx.fillRect(0, floorY, 1000, 50);
    
    document.getElementById("hp1").style.width = player.hp + "%";
    document.getElementById("hp2").style.width = bot.hp + "%";

    drawHybrid(ctx, player.x, player.y, hybrid.a1, hybrid.a2, 1, false);
    drawHybrid(ctx, bot.x, bot.y, "DINO", "SCORPION", 1, true);

    ctx.fillStyle = "#0ff"; player.bullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, 6, 0, Math.PI*2); ctx.fill(); });
    ctx.fillStyle = "#f80"; bot.bullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, 6, 0, Math.PI*2); ctx.fill(); });
    
    if(!gameRunning) {
        ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.fillRect(0,0,1000,500);
        ctx.fillStyle = "white"; ctx.font = "50px Arial";
        ctx.fillText(player.hp > 0 ? "VICTORY!" : "FATALITY!", 380, 250);
    }
}

function downloadGame() {
    const htmlContent = document.documentElement.outerHTML;
    const blob = new Blob([htmlContent], { type: 'text/html' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'HybridCombat_Gabi_V2.html';
    a.click();
}

generate();
</script>

</body></html>
