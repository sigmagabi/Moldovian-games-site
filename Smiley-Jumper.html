<!DOCTYPE html>
<html lang="ro"><head></head><body contenteditable="false">
The content of the body element is displayed in your browser.






    <meta charset="UTF-8">
    <title>Smiley Jumper - Logic Edition</title>
    <style>
        body { margin: 0; background: #0a0a0c; color: white; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; touch-action: none; }
        canvas { background: linear-gradient(#001d3d, #000814); border: 4px solid #333; border-radius: 15px; box-shadow: 0 0 30px rgba(0,0,0,0.5); cursor: none; }
        #ui { position: absolute; top: 25px; left: 25px; font-size: 32px; font-weight: bold; color: #ffca28; text-shadow: 2px 2px #000; pointer-events: none; z-index: 10; }
        #dl-btn { position: absolute; top: 25px; right: 25px; padding: 12px 24px; background: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; z-index: 100; }
        #dl-btn:hover { background: #2ecc71; transform: scale(1.05); }
        #game-over { position: absolute; background: rgba(0,0,0,0.95); padding: 50px; text-align: center; border: 4px solid #ff4757; display: none; border-radius: 20px; z-index: 200; box-shadow: 0 0 50px #ff4757; }
        .btn-restart { padding: 15px 30px; font-size: 20px; background: #ff4757; color: white; border: none; border-radius: 10px; cursor: pointer; margin-top: 20px; font-weight: bold; }
    </style>



    <button id="dl-btn" onclick="downloadGame()">📥 DESCARCĂ JOCUL</button>
    <div id="ui"><span id="height">646</span> m</div>
    
    <canvas id="canvas" width="400" height="650"></canvas>

    <div id="game-over" style="display: none;">
        <h1 style="color:#ff4757; font-size: 48px; margin: 0;">AI CĂZUT!</h1>
        <p style="font-size: 24px;">Ai urcat <span id="finalHeight">0</span> metri</p>
        <button class="btn-restart" onclick="resetGame()">ÎNCEARCĂ IAR</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 400;
        canvas.height = 650;

        let heightScore = 0;
        let gameActive = true;
        let platforms = [];
        let lastPlatformY = 600; // Referință pentru distanțare
        
        const gravity = 0.4;
        const jumpPower = -12.5;

        const player = {
            x: 200, y: 500, r: 18,
            vy: 0, faceDir: 1
        };

        function createPlatforms() {
            platforms = [];
            lastPlatformY = canvas.height - 50;
            
            // Platforma de bază (sigură la start)
            platforms.push({ x: 100, y: lastPlatformY, w: 200, h: 15, type: 'normal' });
            
            // Generăm restul platformelor cu distanță logică între ele
            while (lastPlatformY > -100) {
                spawnLogicalPlatform();
            }
        }

        function spawnLogicalPlatform() {
            // Distanța între platforme (între 80 și 110 pixeli pe verticală)
            const step = 85 + Math.random() * 30;
            lastPlatformY -= step;

            const r = Math.random();
            let type = 'normal';
            if (r > 0.75) type = 'moving';
            if (r > 0.92) type = 'break'; // Roșie - dispare la prima atingere

            platforms.push({
                x: Math.random() * (canvas.width - 85),
                y: lastPlatformY,
                w: 85, h: 14,
                type: type,
                speed: 1.5 + Math.random() * 2,
                dir: Math.random() > 0.5 ? 1 : -1
            });
        }

        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x, player.y);
            
            // Corp Smiley
            ctx.beginPath();
            ctx.arc(0, 0, player.r, 0, Math.PI * 2);
            ctx.fillStyle = "#ffca28";
            ctx.fill();
            ctx.strokeStyle = "#443300";
            ctx.lineWidth = 2;
            ctx.stroke();

            // Ochi (se mișcă după direcție)
            ctx.fillStyle = "#000";
            ctx.beginPath();
            ctx.arc(-6 + (player.faceDir * 2), -5, 3, 0, Math.PI * 2); 
            ctx.arc(8 + (player.faceDir * 2), -5, 3, 0, Math.PI * 2);
            ctx.fill();

            // Gura
            ctx.beginPath();
            ctx.arc(0, 4, 8, 0.2 * Math.PI, 0.8 * Math.PI);
            ctx.stroke();
            ctx.restore();
        }

        function update() {
            if(!gameActive) return;

            player.vy += gravity;
            player.y += player.vy;

            // Screen Wrap
            if (player.x + player.r < 0) player.x = canvas.width + player.r;
            if (player.x - player.r > canvas.width) player.x = -player.r;

            // Camera Scroll (Logică de urcare infinită)
            if (player.y < 300 && player.vy < 0) {
                let diff = 300 - player.y;
                player.y = 300;
                heightScore += Math.floor(diff / 5);
                document.getElementById('height').innerText = heightScore;
                lastPlatformY += diff; // Ajustăm referința pentru noi platforme

                platforms.forEach(p => {
                    p.y += diff;
                });
            }

            // Ștergem platformele vechi și punem altele noi sus
            platforms = platforms.filter(p => p.y < canvas.height);
            while (platforms.length < 10) {
                spawnLogicalPlatform();
            }

            // Coliziune (doar când cade)
            if (player.vy > 0) {
                platforms.forEach((p, index) => {
                    if (player.x + 10 > p.x &&
                        player.x - 10 < p.x + p.w &&
                        player.y + player.r > p.y &&
                        player.y + player.r < p.y + p.h + 12) {
                        
                        player.vy = jumpPower;

                        if (p.type === 'break') {
                            platforms.splice(index, 1);
                        }
                    }
                });
            }

            // Mișcare platforme galbene
            platforms.forEach(p => {
                if(p.type === 'moving') {
                    p.x += p.speed * p.dir;
                    if(p.x <= 0 || p.x + p.w >= canvas.width) p.dir *= -1;
                }
            });

            if (player.y > canvas.height + 100) endGame();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Platforme desenate frumos
            platforms.forEach(p => {
                if(p.type === 'normal') ctx.fillStyle = '#2ecc71';
                if(p.type === 'moving') ctx.fillStyle = '#f1c40f';
                if(p.type === 'break') ctx.fillStyle = '#ff4757';
                
                ctx.beginPath();
                ctx.roundRect(p.x, p.y, p.w, p.h, 6);
                ctx.fill();
                
                // Efect de umbră pe platformă
                ctx.fillStyle = 'rgba(0,0,0,0.15)';
                ctx.fillRect(p.x, p.y + p.h/1.5, p.w, p.h/3);
            });

            drawPlayer();
        }

        function loop() {
            update();
            draw();
            if(gameActive) requestAnimationFrame(loop);
        }

        const handleMove = (x) => {
            const rect = canvas.getBoundingClientRect();
            const newX = x - rect.left;
            player.faceDir = newX > player.x ? 1 : -1;
            player.x = newX;
        };

        window.addEventListener('mousemove', (e) => handleMove(e.clientX));
        window.addEventListener('touchmove', (e) => {
            handleMove(e.touches[0].clientX);
            e.preventDefault();
        }, {passive: false});

        function endGame() {
            gameActive = false;
            document.getElementById('game-over').style.display = 'block';
            document.getElementById('finalHeight').innerText = heightScore;
        }

        function resetGame() {
            heightScore = 0;
            document.getElementById('height').innerText = '0';
            player.x = 200; player.y = 500; player.vy = 0;
            gameActive = true;
            document.getElementById('game-over').style.display = 'none';
            createPlatforms();
            loop();
        }

        function downloadGame() {
            const html = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
            const blob = new Blob([html], {type: 'text/html'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'SmileyJumper_Logic.html';
            a.click();
        }

        createPlatforms();
        loop();
    </script>

</body></html>
