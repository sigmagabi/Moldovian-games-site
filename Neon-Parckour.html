<html lang="ro"><head></head><body contenteditable="false">
The content of the body element is displayed in your browser.






    <meta charset="UTF-8">
    <title>Neon Parkour - Pro Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; }
        
        #header {
            position: absolute; top: 0; left: 0; width: 100%;
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px; box-sizing: border-box; pointer-events: none;
            z-index: 10;
        }

        #zone-display { font-size: 40px; text-transform: uppercase; text-shadow: 0 0 20px currentColor; }
        #score-display { color: white; font-size: 24px; text-shadow: 0 0 10px white; }

        /* Butonul de Download */
        #dl-btn {
            position: absolute; top: 80px; left: 20px;
            padding: 10px 15px; background: #0ff; color: #000;
            border: none; cursor: pointer; font-weight: bold;
            border-radius: 5px; box-shadow: 0 0 10px #0ff;
            z-index: 100;
        }
        #dl-btn:hover { background: #fff; }
    </style>


    <button id="dl-btn">DESCARCĂ JOCUL PE PC</button>
    <div id="header">
        <div id="score-display">SCOR: 0</div>
        <div id="zone-display" style="color: #0f0;">ZONA: EASY</div>
        <div style="width: 100px;"></div>
    </div>
    <canvas id="game" width="820" height="892"></canvas>

<script>
// --- FUNCTIA DE DOWNLOAD ---
document.getElementById('dl-btn').addEventListener('click', function() {
    const htmlContent = document.documentElement.outerHTML;
    const blob = new Blob([htmlContent], { type: 'text/html' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'neon_parkour_final.html';
    a.click();
});

// --- LOGICA JOCULUI (RAMANE NESCHIMBATA) ---
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const zoneText = document.getElementById("zone-display");
const scoreText = document.getElementById("score-display");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0;
let gameOver = false;
let currentZone = "EASY";

const player = {
    x: 100, y: 300, w: 30, h: 30,
    vx: 0, vy: 0, speed: 7, jump: -17,
    gravity: 0.85, grounded: false
};

const keys = {};
window.addEventListener("keydown", e => keys[e.code] = true);
window.addEventListener("keyup", e => keys[e.code] = false);

let platforms = [];
const zones = {
    "EASY":    { color: "#0f0", minGap: 140, maxGap: 190, width: 220, threshold: 0 },
    "MEDIUM":  { color: "#ff0", minGap: 200, maxGap: 260, width: 160, threshold: 1500 },
    "HARD":    { color: "#f00", minGap: 260, maxGap: 330, width: 100, threshold: 4000 },
    "INSANE":  { color: "#f0f", minGap: 320, maxGap: 380, width: 70, threshold: 8000 },
    "GODLIKE": { color: "#0ff", minGap: 360, maxGap: 420, width: 50, threshold: 15000 }
};

function spawnPlatform() {
    let config = zones[currentZone];
    let last = platforms[platforms.length - 1];
    let newX = last.x + config.minGap + Math.random() * (config.maxGap - config.minGap);
    let newY = last.y + (Math.random() - 0.5) * 300;
    if (newY < 200) newY = 250;
    if (newY > canvas.height - 100) newY = canvas.height - 200;
    platforms.push({ x: newX, y: newY, w: config.width, h: 15, color: config.color });
}

function updateLogic() {
    if (gameOver) return;
    if (keys["ArrowRight"] || keys["KeyD"]) player.vx = player.speed;
    else if (keys["ArrowLeft"] || keys["KeyA"]) player.vx = -player.speed;
    else player.vx *= 0.8;
    if ((keys["Space"] || keys["ArrowUp"] || keys["KeyW"]) && player.grounded) {
        player.vy = player.jump; player.grounded = false;
    }
    player.vy += player.gravity;
    player.x += player.vx;
    player.y += player.vy;
    if (player.x > canvas.width / 2.5) {
        let shift = player.x - canvas.width / 2.5;
        player.x = canvas.width / 2.5;
        platforms.forEach(p => p.x -= shift);
        score += Math.floor(shift / 2);
    }
    player.grounded = false;
    platforms.forEach(p => {
        if (player.vy >= 0 && player.x + player.w > p.x && player.x < p.x + p.w &&
            player.y + player.h >= p.y && player.y + player.h <= p.y + p.h + player.vy) {
            player.y = p.y - player.h; player.vy = 0; player.grounded = true;
        }
    });
    for (let z in zones) if (score >= zones[z].threshold) currentZone = z;
    zoneText.innerText = "ZONA: " + currentZone;
    zoneText.style.color = zones[currentZone].color;
    scoreText.innerText = "SCOR: " + score;
    if (platforms[platforms.length - 1].x < canvas.width + 500) spawnPlatform();
    if (platforms[0].x + platforms[0].w < -100) platforms.shift();
    if (player.y > canvas.height) gameOver = true;
}

function draw() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.shadowBlur = 15;
    platforms.forEach(p => {
        ctx.shadowColor = p.color; ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, p.w, p.h);
    });
    ctx.shadowColor = "white"; ctx.fillStyle = "white";
    ctx.fillRect(player.x, player.y, player.w, player.h);
    if (gameOver) {
        ctx.shadowBlur = 0; ctx.fillStyle = "rgba(0,0,0,0.8)";
        ctx.fillRect(0,0, canvas.width, canvas.height);
        ctx.fillStyle = "white"; ctx.textAlign = "center";
        ctx.font = "40px Arial"; ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2);
        ctx.font = "20px Arial"; ctx.fillText("Apasă R pentru Restart", canvas.width/2, canvas.height/2 + 50);
    }
}

function gameLoop() { updateLogic(); draw(); requestAnimationFrame(gameLoop); }
function reset() {
    score = 0; gameOver = false; currentZone = "EASY";
    player.x = 100; player.y = 300; player.vy = 0;
    platforms = [{ x: 50, y: canvas.height - 150, w: 400, h: 15, color: "#0f0" }];
    for(let i=0; i<10; i++) spawnPlatform();
}
window.addEventListener("keydown", e => { if (e.code === "KeyR" && gameOver) reset(); });
reset();
gameLoop();
</script>

</body></html>
