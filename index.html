<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Cool Games - Gabi (Emoji Edition)</title>
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at center, #4a2b11 0%, #0a0a0a 100%);
            --card-bg: rgba(15, 15, 25, 0.85);
            --accent-green: #23d5ab;
            --text-main: #ffffff;
        }

        body {
            margin: 0;
            background: var(--bg-gradient);
            background-attachment: fixed;
            font-family: 'Segoe UI', sans-serif;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- ADMIN PANEL --- */
        #admin-panel {
            background: rgba(0, 0, 0, 0.95);
            border: 1px solid #4facfe;
            padding: 25px;
            border-radius: 15px;
            margin-top: 20px;
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 100;
        }

        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.8rem; color: #4facfe; font-weight: bold; }

        input[type="file"] {
            background: #111;
            padding: 10px;
            border-radius: 8px;
            border: 1px dashed #444;
            color: #888;
            cursor: pointer;
        }

        select {
            background: #111;
            color: white;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #333;
            font-size: 1rem;
        }

        .btn-add {
            background: #4facfe;
            color: black;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* --- GRID --- */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            width: 90%;
            max-width: 1100px;
            padding: 50px 0;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .emoji-display { font-size: 3rem; margin-bottom: 10px; display: block; }
        .file-name { font-size: 1rem; font-weight: bold; color: #eee; word-break: break-all; }

        .play-btn {
            background: var(--accent-green);
            color: black;
            text-decoration: none;
            padding: 12px;
            border-radius: 12px;
            display: block;
            margin-top: 20px;
            font-weight: bold;
        }

        #toggle-admin { position: fixed; bottom: 20px; right: 20px; cursor: pointer; background: none; border: none; font-size: 24px; z-index: 1000; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <button id="toggle-admin" onclick="document.getElementById('admin-panel').classList.toggle('hidden')">⚙️</button>

    <div id="admin-panel">
        <div class="input-group">
            <label>1. Alege fișierul jocului:</label>
            <input type="file" id="file-picker" accept=".html">
        </div>

        <div class="input-group">
            <label>2. Alege Emoji-ul potrivit:</label>
            <select id="emoji-picker">
                <!-- CATEGORIA JOCURI -->
                <optgroup label="Jocuri & Tech">
                    <option value="🎮">🎮 Consolă</option>
                    <option value="🕹️">🕹️ Joystick</option>
                    <option value="👾">👾 Monstru Pixel</option>
                    <option value="💻">💻 Programare</option>
                    <option value="🔊">🔊 Audio System[cite: 24]</option>
                </optgroup>
                <!-- CATEGORIA ACTIUNE & LUPTA -->
                <optgroup label="Acțiune & Luptă">
                    <option value="⚔️">⚔️ Gladiators</option>
                    <option value="🛡️">🛡️ Apărare</option>
                    <option value="💣">💣 Bombă</option>
                    <option value="🔫">🔫 Shooter</option>
                    <option value="🥊">🥊 Box</option>
                </optgroup>
                <!-- CATEGORIA HORROR & MONSTRI -->
                <optgroup label="Horror & Monștri">
                    <option value="🧟">🧟 Zid vs Zombi[cite: 24]</option>
                    <option value="👻">👻 Escape Barn[cite: 17]</option>
                    <option value="💀">💀 Craniu</option>
                    <option value="🧛">🧛 Vampir</option>
                    <option value="👁️">👁️ Backrooms[cite: 14]</option>
                </optgroup>
                <!-- CATEGORIA VEHICULE -->
                <optgroup label="Vehicule & Viteză">
                    <option value="🏎️">🏎️ Cyber Rider</option>
                    <option value="🚀">🚀 Space Explore</option>
                    <option value="🚜">🚜 Tractor/Barn</option>
                    <option value="🚁">🚁 Elicopter</option>
                    <option value="🚲">🚲 Bicicletă</option>
                </optgroup>
                <!-- CATEGORIA ANIMALE & ALTELE -->
                <optgroup label="Animale & Altele">
                    <option value="🐱">🐱 Motanul/Șoarecele</option>
                    <option value="🐭">🐭 Șoarece</option>
                    <option value="🐦">🐦 Flappy Bird[cite: 16]</option>
                    <option value="🧩">🧩 Puzzle/Block Blast</option>
                    <option value="🔥">🔥 Foc/Boss</option>
                    <option value="⭐">⭐ Stea/Scor</option>
                </optgroup>
            </select>
        </div>

        <button class="btn-add" onclick="addGame()">Adaugă în Portal</button>
    </div>

    <div class="game-grid" id="grid"></div>

    <script>
let games = 
    { name: "Brawl Tanks", url: "BrawlTanks.html", emoji: "🏎️" },
    { name: "Audio Genv18", url: "Audio-Genv18.html", emoji: "🔊" },
    { name: "Audio Lab", url: "AudioLab.html", emoji: "💻" },
    { name: "Backrooms AI", url: "Backrooms-Ai.html", emoji: "💀" },
    { name: "Block Blast", url: "Block-Blast.html", emoji: "🧩" },
    { name: "Cat & Mouse", url: "Cat-&-Mouse.html", emoji: "🐱" },
    { name: "Cyber Rider 3D", url: "Cyber-Rider-3d.html", emoji: "🔥" },
    { name: "Escape the Barn", url: "Escape-the-Barn.html", emoji: "👻" },
    { name: "Flappy Clone", url: "Flappy-clone.html", emoji: "🐦" },
    { name: "Gabi's Case Pro", url: "Gabi's-Case-Pro.html", emoji: "🕹️" },
    { name: "Gremlin Pro", url: "Gremlin-Pro.html", emoji: "👾" },
    { name: "Hacker Mode", url: "Hacker-Mode.html", emoji: "⚔️" },
    { name: "Hybrid Combat V2", url: "Hybrid-Combat-V2.html", emoji: "🔫" },
    { name: "Joke Hub", url: "Joke-Hub.html", emoji: "⭐" },
    { name: "Labirint Mare", url: "Labirint-Mare.html", emoji: "🧛" },
    { name: "Linia de Forță", url: "Linia-de-forta.html", emoji: "🚀" },
    { name: "Neon Parkour", url: "Neon-Parckour.html", emoji: "🎮" },
    { name: "Noaptea la Post", url: "Noaptea-la-Post.html", emoji: "👁️" },
    { name: "Salvarea Lumii", url: "Salvarea-Lumii.html", emoji: "💣" },
    { name: "Samurai Fruit", url: "Samurai-Fruit.html", emoji: "🥊" },
    { name: "Smiley Jumper", url: "Smiley-Jumper.html", emoji: "🐭" },
    { name: "Stickman 1v1", url: "Stickman-1v1.html", emoji: "⚔️" },
    { name: "Stickman Parkour", url: "Stickman-Parckour.html", emoji: "🕹️" },
    { name: "Zid vs Zombi", url: "Zid-vs-Zombi.html", emoji: "🧟" }
;
      function render() 
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            games.forEach((g, i) => {
                grid.innerHTML += `
                    <div class="card">
                        <span class="emoji-display">${g.emoji}</span>
                        <div class="file-name">${g.name}</div>
                        <a href="${g.url}" class="play-btn">Play ►</a>
                        <button onclick="remove(${i})" style="background:none; border:none; color:#444; margin-top:15px; cursor:pointer; font-size:0.7rem;">Elimină</button>
                    </div>
                `;
            });
            localStorage.setItem('gabiPortalV2', JSON.stringify(games));
        }
            localStorage.setItem('gabiPortalV2', JSON.stringify(games));
        }

        function addGame() {
            const fileInput = document.getElementById('file-picker');
            const emojiInput = document.getElementById('emoji-picker');

            if (fileInput.files.length > 0) {
                const fileName = fileInput.files[0].name;
                games.push({
                    name: fileName,
                    emoji: emojiInput.value
                });
                render();
                fileInput.value = ""; 
            } else {
                alert("Te rog selectează un fișier!");
            }
        }

        function remove(i) {
            games.splice(i, 1);
            render();
        }

        render();
    </script>
</body>
</html>
