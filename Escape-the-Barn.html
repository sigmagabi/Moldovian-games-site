<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Escape the Barn – Auto Pickup + Monstru</title>
<style>
  :root{--bg:#080c12;--ink:#eaf2ff;--hud:#0b132bcc;--hudb:#24345a;--accent:#ffd166;--danger:#ff6b6b;}
  html,body{margin:0;height:100%;background:var(--bg);font-family:system-ui,Segoe UI,Arial}
  #wrap{max-width:1024px;margin:10px auto;padding:0 10px}
  #hud{display:flex;gap:8px;flex-wrap:wrap;justify-content:space-between;align-items:center;margin-bottom:8px}
  .pill{background:var(--hud);border:1px solid var(--hudb);color:var(--ink);padding:6px 10px;border-radius:10px;font-weight:800}
  #dl{appearance:none;border:1px solid #2a3a62;background:linear-gradient(180deg,#1b2749,#0f1a2b);color:var(--ink);padding:8px 12px;border-radius:10px;font-weight:800;cursor:pointer}
  canvas{display:block;width:100%;height:auto;background:#0a121a;border-radius:12px}
  #overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;pointer-events:none}
  #card{background:#0b1024cc;border:1px solid #3a4bb3;padding:18px 22px;border-radius:14px;color:var(--ink);text-align:center;max-width:min(520px,92%)}
  #card h2{margin:0 0 8px;color:var(--danger)}
  #card .tip{opacity:.9}
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <div class="pill">🔑 Chei: <b id="keys">0/3</b></div>
    <div class="pill">💡 Lanternă: <b id="lamp">OFF</b></div>
    <div class="pill">🎮 WASD/←↑→↓ mișcare · F lanternă</div>
    <button id="dl">⬇️ Download</button>
  </div>
  <canvas id="cv" width="960" height="540"></canvas>
</div>

<div id="overlay">
  <div id="card">
    <h2 id="ovTitle">JUMPSCARE! 🕸️</h2>
    <div class="tip" id="ovMsg">Găina-Păianjen te-a prins! Click / Space pentru restart</div>
  </div>
</div>

<script>
(() => {
  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  const TILE=32,COLS=Math.floor(W/TILE),ROWS=Math.floor(H/TILE);
  const keysEl = document.getElementById('keys');
  const lampEl = document.getElementById('lamp');
  const overlay = document.getElementById('overlay');
  const ovTitle = document.getElementById('ovTitle');
  const ovMsg = document.getElementById('ovMsg');
  const btnDL = document.getElementById('dl');

  // 0 gol, 1 perete, 2 bară, 3 poartă
  let grid=[], keyItems=[], haveKeys=0, needKeys=3, gateOpen=false;
  let gameOver=false, win=false, hideOverlayTimer=null;

  const player = {x:TILE*2+16,y:TILE*2+16,r:10,vx:0,vy:0,speed:2.4,lamp:false};
  const monster={x:TILE*(COLS-4)+16,y:TILE*(ROWS-4)+16,r:12,speed:1.9,path:[],cool:0};

  const keysDown = Object.create(null);

  function inBounds(c,r){return c>=0&&r>=0&&c<COLS&&r<ROWS;}
  function isWall(c,r){const v=grid[r][c];return v===1||v===2||(v===3&&!gateOpen);}
  function worldToCell(x,y){return{c:Math.floor(x/TILE),r:Math.floor(y/TILE)};}
  function cellCenter(c,r){return{x:c*TILE+TILE/2,y:r*TILE+TILE/2};}
  function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
  function dist(ax,ay,bx,by){return Math.hypot(ax-bx,ay-by);}

  function genBarn(){
    overlay.style.display='none'; if(hideOverlayTimer){clearTimeout(hideOverlayTimer);hideOverlayTimer=null;}
    // margini + structuri simple
    grid = Array.from({length:ROWS},(_,r)=>Array.from({length:COLS},(_,c)=>(r===0||r===ROWS-1||c===0||c===COLS-1)?1:0));
    for(let c=4;c<COLS-4;c+=6){ for(let r=3;r<ROWS-3;r++){ if(r%2===1) grid[r][c]=2; } }
    for(let r=5;r<ROWS-5;r+=4){ for(let c=6;c<COLS-6;c++){ if(c%7===0) grid[r][c]=1; } }
    grid[ROWS-3][COLS-2]=3; // poartă

    player.x=TILE*2+16; player.y=TILE*2+16; player.vx=player.vy=0; player.lamp=false;
    monster.x=TILE*(COLS-4)+16; monster.y=TILE*(ROWS-4)+16; monster.path=[]; monster.cool=0;

    const spots=[{c:3,r:ROWS-4},{c:COLS-6,r:3},{c:Math.floor(COLS/2),r:ROWS-6},{c:6,r:6},{c:COLS-8,r:ROWS-8}];
    keyItems=[];
    while(keyItems.length<needKeys && spots.length){ const i=(Math.random()*spots.length)|0; keyItems.push({...spots.splice(i,1)[0],taken:false}); }
    haveKeys=0; gateOpen=false; win=false; gameOver=false;
    keysEl.textContent='0/'+needKeys; lampEl.textContent='OFF';
  }

  function collidesCircle(x,y,r){
    const minC=Math.floor((x-r)/TILE), maxC=Math.floor((x+r)/TILE);
    const minR=Math.floor((y-r)/TILE), maxR=Math.floor((y+r)/TILE);
    for(let rr=minR;rr<=maxR;rr++)for(let cc=minC;cc<=maxC;cc++){
      if(!inBounds(cc,rr)) return true;
      if(isWall(cc,rr)){
        const cx=clamp(x, cc*TILE, cc*TILE+TILE);
        const cy=clamp(y, rr*TILE, rr*TILE+TILE);
        if((x-cx)*(x-cx)+(y-cy)*(y-cy)<=r*r) return true;
      }
    }
    return false;
  }

  function moveWithColl(obj){
    let nx=obj.x+obj.vx, ny=obj.y;
    if(!collidesCircle(nx,ny,obj.r)) obj.x=nx;
    else{ const s=Math.sign(obj.vx); while(!collidesCircle(obj.x+s,ny,obj.r)&&Math.abs(nx-obj.x)>1)obj.x+=s; }
    nx=obj.x; ny=obj.y+obj.vy;
    if(!collidesCircle(nx,ny,obj.r)) obj.y=ny;
    else{ const s=Math.sign(obj.vy); while(!collidesCircle(nx,obj.y+s,obj.r)&&Math.abs(ny-obj.y)>1)obj.y+=s; }
  }

  // Input
  addEventListener('keydown', e=>{
    keysDown[e.code]=true;
    if(e.code==='KeyF'){ player.lamp=!player.lamp; lampEl.textContent=player.lamp?'ON':'OFF'; }
    if((e.code==='Space'||e.code==='Enter') && (gameOver||win)) genBarn();
  });
  addEventListener('keyup', e=>{ keysDown[e.code]=false; });
  addEventListener('mousedown', ()=>{ if(gameOver||win) genBarn(); });

  function updatePlayer(){
    let ax=0, ay=0;
    if(keysDown['KeyA']||keysDown['ArrowLeft']) ax-=1;
    if(keysDown['KeyD']||keysDown['ArrowRight']) ax+=1;
    if(keysDown['KeyW']||keysDown['ArrowUp']) ay-=1;
    if(keysDown['KeyS']||keysDown['ArrowDown']) ay+=1;
    const len=Math.hypot(ax,ay)||1;
    player.vx=(ax/len)*player.speed;
    player.vy=(ay/len)*player.speed;
    moveWithColl(player);

    // AUTO-PICKUP chei
    for(const k of keyItems){
      if(!k.taken){
        const cc=cellCenter(k.c,k.r);
        if(dist(player.x,player.y,cc.x,cc.y)<24){
          k.taken=true; haveKeys++; keysEl.textContent=haveKeys+'/'+needKeys;
          if(haveKeys>=needKeys) gateOpen=true;
        }
      }
    }
  }

  function bfsPath(start, goal){
    const q=[start];
    const came=new Map(); const key=(c,r)=>c+','+r;
    came.set(key(start.c,start.r), null);
    const dirs=[[1,0],[-1,0],[0,1],[0,-1]];
    while(q.length){
      const cur=q.shift();
      if(cur.c===goal.c&&cur.r===goal.r) break;
      for(const d of dirs){
        const nc=cur.c+d[0], nr=cur.r+d[1];
        if(!inBounds(nc,nr)||isWall(nc,nr)) continue;
        const k=key(nc,nr);
        if(!came.has(k)){ came.set(k, key(cur.c,cur.r)); q.push({c:nc,r:nr}); }
      }
    }
    const path=[]; let k=key(goal.c,goal.r);
    if(!came.has(k)) return null;
    while(k){ const [c,r]=k.split(',').map(Number); path.push([c,r]); k=came.get(k); }
    path.reverse(); return path;
  }

  function updateMonster(dt){
    monster.cool-=dt;
    const pc=worldToCell(player.x,player.y);
    const mc=worldToCell(monster.x,monster.y);
    const recalc = player.lamp ? 0.2 : 0.6;
    if(monster.cool<=0){ monster.path=bfsPath(mc,pc); monster.cool=recalc; }
    const spd = player.lamp ? monster.speed*1.25 : monster.speed;
    if(monster.path && monster.path.length>1){
      const next=monster.path[1];
      const target=cellCenter(next[0],next[1]);
      const dx=target.x-monster.x, dy=target.y-monster.y, d=Math.hypot(dx,dy)||1;
      monster.x += (dx/d)*spd; monster.y += (dy/d)*spd;
    }else{
      const dx=player.x-monster.x, dy=player.y-monster.y, d=Math.hypot(dx,dy)||1;
      monster.x += (dx/d)*monster.speed*0.8; monster.y += (dy/d)*monster.speed*0.8;
    }

    // prins
    if(dist(player.x,player.y,monster.x,monster.y) < player.r+monster.r){
      gameOver=true;
      ovTitle.textContent='JUMPSCARE! 🕸️';
      ovMsg.textContent='Găina-Păianjen te-a prins! Click / Space pentru restart';
      overlay.style.display='flex';
      if(hideOverlayTimer) clearTimeout(hideOverlayTimer);
      hideOverlayTimer = setTimeout(()=>{ if(gameOver && !win) overlay.style.display='none'; }, 3000);
    }
  }

  function findGate(){ for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++) if(grid[r][c]===3) return {c,r}; return {c:COLS-2,r:ROWS-3}; }

  // Render
  function draw(){
    const bg=ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,'#061019'); bg.addColorStop(1,'#04080d');
    ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

    for(let r=0;r<ROWS;r++){
      for(let c=0;c<COLS;c++){
        const v=grid[r][c]; if(v===0) continue;
        if(v===1) ctx.fillStyle='#162332';
        if(v===2) ctx.fillStyle='#1f2f46';
        if(v===3) ctx.fillStyle=gateOpen?'#2ecc71':'#7b8794';
        ctx.fillRect(c*TILE,r*TILE,TILE,TILE);
      }
    }

    for(const k of keyItems){
      if(k.taken) continue;
      const cc=cellCenter(k.c,k.r);
      ctx.fillStyle='#ffd166';
      ctx.beginPath(); ctx.arc(cc.x,cc.y,6,0,Math.PI*2); ctx.fill();
      ctx.fillRect(cc.x+4,cc.y-2,10,4);
    }

    // player
    ctx.fillStyle='#9ad0ff';
    ctx.beginPath(); ctx.arc(player.x,player.y,player.r,0,Math.PI*2); ctx.fill();

    // monstru
    ctx.fillStyle='#ff6b6b';
    ctx.beginPath(); ctx.arc(monster.x,monster.y,monster.r,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(255,107,107,0.6)'; ctx.lineWidth=2;
    for(let i=0;i<4;i++){ const ang=(i/4)*Math.PI*2;
      ctx.beginPath();
      ctx.moveTo(monster.x+Math.cos(ang)*8, monster.y+Math.sin(ang)*8);
      ctx.lineTo(monster.x+Math.cos(ang)*18, monster.y+Math.sin(ang)*18);
      ctx.stroke();
    }

    // HUD text mic pe canvas
    ctx.fillStyle='rgba(255,255,255,0.8)';
    ctx.font='12px system-ui';
    ctx.fillText('Chei: '+haveKeys+'/'+needKeys, 8, 16);
  }

  // Loop
  let last=0;
  function frame(ts){
    if(!last) last=ts;
    const dt=Math.min(50, ts-last)/1000; last=ts;

    if(!gameOver && !win){
      updatePlayer();
      updateMonster(dt);
      // win check
      if(gateOpen){
        const g=findGate(); const gc=cellCenter(g.c,g.r);
        if(dist(player.x,player.y,gc.x,gc.y)<26){
          win=true;
          ovTitle.textContent='Ai scăpat! 🏃‍♂️💨';
          ovMsg.textContent='Click / Space pentru a rejuca';
          overlay.style.display='flex';
          if(hideOverlayTimer) clearTimeout(hideOverlayTimer);
          hideOverlayTimer = setTimeout(()=>{ if(win && !gameOver) overlay.style.display='none'; }, 3000);
        }
      }
    }

    draw();
    requestAnimationFrame(frame);
  }

  // Download
  btnDL.addEventListener('click', ()=>{
    const blob=new Blob([document.documentElement.outerHTML],{type:'text/html'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download='escape_the_barn_monstru.html';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),800);
  });

  // Start
  genBarn();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
